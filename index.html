<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Pro Max</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Snow Effect overlay */
        .snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .snowflake {
            position: absolute;
            color: #fff;
            font-size: 1em;
            opacity: 0.8;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); }
            100% { transform: translateY(105vh) rotate(360deg); }
        }

        .container {
            background: rgba(30, 30, 40, 0.75);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 10;
        }

        .hidden { display: none !important; }

        /* Top Profile Image Layout */
        .profile-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #ff4b2b;
            box-shadow: 0 0 15px rgba(255, 75, 43, 0.5);
        }

        .profile-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2, h3, h4 {
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            text-align: center;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ff4b2b;
            background: rgba(255,255,255,0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.3);
            margin-bottom: 10px;
        }

        .btn:active { transform: scale(0.98); }
        .btn-secondary { background: linear-gradient(135deg, #4f46e5, #3b82f6); box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3); }
        .btn-danger { background: linear-gradient(135deg, #dc2626, #b91c1c); box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3); }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .grid-item {
            background: rgba(255,255,255,0.05);
            padding: 20px 10px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .grid-item:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.2);
        }

        .grid-item span { font-size: 24px; }

        /* Vault & PDF History Lists */
        .vault-gallery, .pdf-list-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
            max-height: 180px;
            overflow-y: auto;
            padding: 5px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
        }

        .pdf-list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 150px;
            text-align: left;
        }

        .pdf-history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.08);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
        }

        .pdf-history-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .pdf-share-btn {
            background: #00ffcc;
            color: black;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }

        .vault-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            background: #000;
        }

        .vault-item img, .vault-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .share-overlay-btn {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.75);
            color: #00ffcc;
            font-size: 11px;
            padding: 4px 0;
            border: none;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .file-box {
            border: 2px dashed rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            cursor: pointer;
            background: rgba(255,255,255,0.02);
        }

        .file-box:hover { border-color: #ff4b2b; }

        #pdf-preview-gallery {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            margin-bottom: 10px;
            padding: 5px;
        }

        #pdf-preview-gallery img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="parano.mp3" type="audio/mpeg">
    </audio>

    <div class="snow-container" id="snowContainer"></div>

    <div id="login-screen" class="container">
        <div class="profile-container">
            <img src="profile.jpg" alt="Profile Image">
        </div>
        <h2>Nexora Pro Max</h2>
        <input type="text" id="username" placeholder="ඔබේ නම (Pansilu)...">
        <button class="btn" onclick="startApp()">START APP</button>
    </div>

    <div id="main-screen" class="container hidden">
        <div class="profile-container">
            <img src="profile.jpg" alt="Profile Image">
        </div>
        <h3 id="welcome-text">ආයුබෝවන්!</h3>
        
        <div class="grid">
            <div class="grid-item" onclick="openTool('youtube')"><span>📺</span>YouTube</div>
            <div class="grid-item" onclick="openTool('whatsapp')"><span>💬</span>WhatsApp</div>
            <div class="grid-item" onclick="openTool('pdf-converter')"><span>📄</span>Image to PDF</div>
            <div class="grid-item" onclick="checkVaultAccess()"><span>🔒</span>Private Vault</div>
        </div>
    </div>

    <div id="pdf-screen" class="container hidden">
        <h3>Image to PDF Converter</h3>
        <div class="file-box" onclick="document.getElementById('pdf-inputs').click()">
            පින්තූර තෝරන්න (Max 20)
            <input type="file" id="pdf-inputs" accept="image/*" multiple class="hidden" onchange="previewPDFImages()">
        </div>
        <div id="pdf-preview-gallery"></div>
        <button class="btn" onclick="generatePDF()">Convert to PDF</button>
        
        <h4 style="font-size: 14px; text-align: left; margin-top: 10px;">සෑදූ PDF ගොනු:</h4>
        <div class="pdf-list-container" id="pdfList"></div>

        <button class="btn btn-secondary" onclick="backToMenu('pdf-screen')">Back to Menu</button>
    </div>

    <div id="vault-screen" class="container hidden">
        <h3>🔒 Private Vault</h3>
        <p style="font-size: 13px; margin-bottom: 10px; color: #ccc;">රහසිගත ඡායාරූප සහ වීඩියෝ සුරකින්න / Share කරන්න.</p>
        
        <div class="file-box" onclick="document.getElementById('vault-input').click()">
            Vault එකට එක් කරන්න (Photo/Video)
            <input type="file" id="vault-input" accept="image/*,video/*" multiple class="hidden" onchange="saveToVault()">
        </div>

        <div class="vault-gallery" id="vaultGallery"></div>

        <button class="btn btn-danger" onclick="clearVault()">Clear All Items</button>
        <button class="btn btn-secondary" onclick="backToMenu('vault-screen')">Back to Menu</button>
    </div>

    <script>
        const clickSound = new Audio("https://www.soundjay.com/button/button-16.mp3");

        // Snow effect generation
        function createSnow() {
            const container = document.getElementById('snowContainer');
            for (let i = 0; i < 30; i++) {
                let flake = document.createElement('div');
                flake.className = 'snowflake';
                flake.innerText = '❄';
                flake.style.left = Math.random() * 100 + 'vw';
                flake.style.animationDuration = (Math.random() * 3 + 2) + 's';
                flake.style.animationDelay = Math.random() * 2 + 's';
                flake.style.fontSize = (Math.random() * 10 + 10) + 'px';
                container.appendChild(flake);
            }
        }
        createSnow();

        function startApp() {
            clickSound.play();
            let user = document.getElementById('username').value.trim();
            if(user === "") user = "Pansilu";
            
            document.getElementById('welcome-text').innerText = `ආයුබෝවන්, ${user}!`;
            
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.play().catch(() => { console.log("Audio autoplay restricted."); });

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }

        function backToMenu(currentScreenId) {
            clickSound.play();
            document.getElementById(currentScreenId).classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }

        function openTool(type) {
            clickSound.play();
            if(type === 'youtube') {
                window.open('https://youtube.com/@NexoraLab-y8j', '_blank');
            } else if(type === 'whatsapp') {
                window.open('https://whatsapp.com/channel/0029Vb7asEM9hXF90ZcoZB3f', '_blank');
            } else if(type === 'pdf-converter') {
                document.getElementById('main-screen').classList.add('hidden');
                document.getElementById('pdf-screen').classList.remove('hidden');
                loadPDFList();
            }
        }

        /* --- PRIVATE VAULT SECURITY & LOGIC --- */
        function checkVaultAccess() {
            clickSound.play();
            let code = prompt("Private Vault එකට ඇතුළු වීමට Lock Code එක ('1234') ලබා දෙන්න:");
            if(code === "1234") {
                document.getElementById('main-screen').classList.add('hidden');
                document.getElementById('vault-screen').classList.remove('hidden');
                loadVaultImages();
            } else if(code !== null) {
                alert("වැරදි කේතයකි! නැවත උත්සාහ කරන්න.");
            }
        }

        function saveToVault() {
            const files = document.getElementById('vault-input').files;
            if (files.length === 0) return;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let savedData = localStorage.getItem('vault_images');
                    let list = savedData ? JSON.parse(savedData) : [];
                    list.push({
                        name: file.name,
                        type: file.type,
                        data: e.target.result
                    });
                    localStorage.setItem('vault_images', JSON.stringify(list));
                    loadVaultImages();
                };
                reader.readAsDataURL(file);
            });
        }

        function loadVaultImages() {
            const gallery = document.getElementById('vaultGallery');
            gallery.innerHTML = "";
            let savedData = localStorage.getItem('vault_images');
            let list = savedData ? JSON.parse(savedData) : [];

            if(list.length === 0) {
                gallery.innerHTML = `<p style="grid-column: span 3; font-size:12px; color:#aaa; padding:10px;">ලබාදුන් පින්තූර හෝ වීඩියෝ නොමැත.</p>`;
                return;
            }

            list.forEach((item, index) => {
                let div = document.createElement('div');
                div.className = 'vault-item';
                
                let mediaElement;
                if (item.type && item.type.startsWith('video/')) {
                    mediaElement = document.createElement('video');
                    mediaElement.src = item.data;
                    mediaElement.muted = true;
                    mediaElement.playsInline = true;
                } else {
                    mediaElement = document.createElement('img');
                    mediaElement.src = item.data;
                }
                
                let shareBtn = document.createElement('button');
                shareBtn.className = 'share-overlay-btn';
                shareBtn.innerText = 'SHARE';
                shareBtn.onclick = () => shareVaultMedia(item.data, item.name, item.type);

                div.appendChild(mediaElement);
                div.appendChild(shareBtn);
                gallery.appendChild(div);
            });
        }

        async function shareVaultMedia(base64Data, filename, mimeType) {
            clickSound.play();
            try {
                const res = await fetch(base64Data);
                const blob = await res.blob();
                const file = new File([blob], filename, { type: mimeType });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'Nexora Vault Share',
                        text: 'Private Vault එකෙන් Share කරන ලදි.'
                    });
                } else {
                    alert("ඔබගේ දුරකථනය මෙම Native Share පහසුකමට සපයන්නේ නැත.");
                }
            } catch (error) {
                console.error("Sharing failed", error);
            }
        }

        function clearVault() {
            if(confirm("සියලුම දේ Vault එකෙන් ඉවත් කිරීමට අවශ්‍යද?")) {
                localStorage.removeItem('vault_images');
                loadVaultImages();
            }
        }

        /* --- IMAGE TO PDF CONVERTER LOGIC WITH HISTORY & SHARE --- */
        function previewPDFImages() {
            const gallery = document.getElementById('pdf-preview-gallery');
            gallery.innerHTML = "";
            const files = document.getElementById('pdf-inputs').files;
            
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let img = document.createElement('img');
                    img.src = e.target.result;
                    gallery.appendChild(img);
                }
                reader.readAsDataURL(file);
            });
        }

        async function generatePDF() {
            clickSound.play();
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const files = document.getElementById('pdf-inputs').files;

            if (files.length === 0) {
                alert("කරුණාකර ප්‍රථමයෙන් පින්තූර තෝරාගන්න!");
                return;
            }

            alert("PDF එක සකසමින් පවතී. කරුණාකර රැඳී සිටින්න...");

            for (let i = 0; i < files.length; i++) {
                if (i > 0) doc.addPage();
                
                const promise = new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        doc.addImage(e.target.result, 'JPEG', 10, 10, 190, 250);
                        resolve();
                    };
                    reader.readAsDataURL(files[i]);
                });
                await promise;
            }

            // Save PDF to a DataURL to keep in app history
            const pdfOutputBase64 = doc.output('datauristring');
            const pdfName = `Nexora_${Date.now()}.pdf`;

            let savedPDFs = localStorage.getItem('nexora_pdfs');
            let pdfList = savedPDFs ? JSON.parse(savedPDFs) : [];
            pdfList.push({ name: pdfName, data: pdfOutputBase64 });
            localStorage.setItem('nexora_pdfs', JSON.stringify(pdfList));

            doc.save(pdfName);
            alert("PDF එක සාර්ථකව Download විය!");
            loadPDFList(); // Refresh inside application view
        }

        function loadPDFList() {
            const listContainer = document.getElementById('pdfList');
            listContainer.innerHTML = "";
            let savedPDFs = localStorage.getItem('nexora_pdfs');
            let pdfList = savedPDFs ? JSON.parse(savedPDFs) : [];

            if(pdfList.length === 0) {
                listContainer.innerHTML = `<p style="font-size:12px; color:#aaa; padding:5px;">සෑදූ PDF ගොනු කිසිවක් නොමැත.</p>`;
                return;
            }

            pdfList.forEach((pdf, index) => {
                let div = document.createElement('div');
                div.className = 'pdf-history-item';
                div.innerHTML = `
                    <span>📄 ${pdf.name}</span>
                    <button class="pdf-share-btn" onclick="sharePDFFile('${pdf.data}', '${pdf.name}')">SHARE</button>
                `;
                listContainer.appendChild(div);
            });
        }

        async function sharePDFFile(base64Data, filename) {
            clickSound.play();
            try {
                const res = await fetch(base64Data);
                const blob = await res.blob();
                const file = new File([blob], filename, { type: 'application/pdf' });

                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'Nexora Document Share',
                        text: 'Nexora App එකෙන් සාදන ලද PDF ගොනුවකි.'
                    });
                } else {
                    alert("ඔබගේ දුරකථනය මෙම PDF Share පහසුකමට සපයන්නේ නැත.");
                }
            } catch (error) {
                console.error("PDF Sharing failed", error);
            }
        }
    </script>
</body>
</html>
