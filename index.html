<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Pro Max - Official</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Snowflake Animation */
        .snowflake { position: fixed; top: -10px; color: white; user-select: none; z-index: 1000; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh); } }

        .container {
            background: rgba(0, 0, 0, 0.85);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hidden { display: none !important; }

        input[type="text"], input[type="password"] {
            width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; background: rgba(255,255,255,0.2); color: white; outline: none; text-align: center;
        }
        input::placeholder { color: #ddd; }

        .btn {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white; padding: 12px 20px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; transition: 0.3s; margin: 8px; width: 85%; font-size: 15px;
        }
        .btn:hover { transform: scale(1.05); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .grid-item {
            background: rgba(255, 255, 255, 0.15); padding: 20px; border-radius: 15px;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); font-weight: bold;
        }
        .grid-item:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-3px); }

        /* Top Image Style */
        .top-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ff416c; margin-bottom: 15px; object-fit: cover; box-shadow: 0 0 15px rgba(255,65,108,0.5); }
        
        #pdf-list, #vault-gallery {
            display: flex; flex-direction: column; gap: 10px; margin-top: 15px;
        }
        .file-item {
            background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .vault-media { width: 100%; max-height: 150px; object-fit: contain; border-radius: 8px; margin-top: 5px; }
        .vault-card { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-bottom: 10px; position: relative; }
        .delete-btn { background: red; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="clickSound">
        <source src="https://www.soundjay.com/buttons/button-16.mp3" type="audio/mpeg">
    </audio>

    <div id="login-screen" class="container">
        <h2>Nexora Pro Max</h2>
        <input type="text" id="username" placeholder="ඔබේ නම (Pansilu)...">
        <button class="btn" onclick="startApp()">START APP</button>
    </div>

    <div id="main-screen" class="container hidden">
        <img src="https://i.ibb.co/vz6mXmP/user-pro.jpg" class="top-img" alt="Nexora Logo">
        <h3 id="welcome-txt">ආයුබෝවන්!</h3>
        <div class="grid">
            <div class="grid-item" onclick="openLink('https://youtube.com/@NexoraLab-y8j')">📺 YouTube</div>
            <div class="grid-item" onclick="openLink('https://whatsapp.com/channel/0029Vb7asEM9hXF90ZoOoX12H')">💬 WhatsApp</div>
            <div class="grid-item" onclick="showSection('pdf-section')">📄 Image to PDF</div>
            <div class="grid-item" onclick="checkVaultAccess()">🔐 Private Vault</div>
        </div>
    </div>

    <div id="pdf-section" class="container hidden">
        <h3>Image to PDF 📄</h3>
        <input type="file" id="pdf-input" multiple accept="image/*" class="btn" style="background:transparent; border:1px dashed #fff;">
        <button class="btn" onclick="generatePDF()">Convert to PDF (Max 20)</button>
        <div id="pdf-list"></div>
        <button class="btn" onclick="showSection('main-screen')" style="background: #555;">Back to Menu</button>
    </div>

    <div id="vault-section" class="container hidden">
        <h3>🔐 Private Vault</h3>
        
        <div id="vault-setup" class="hidden">
            <p>ඔබේ රහසිගත Vault Code එක ඇතුළත් කරන්න:</p>
            <input type="password" id="new-vault-code" placeholder="Set Your Secret Code">
            <button class="btn" onclick="saveVaultCode()">Save Secret Code</button>
        </div>

        <div id="vault-content" class="hidden">
            <p style="font-size:12px; color:#bbb;">මෙහි සුරකින Photo/Video ගැලරියෙන් මැකුවද ආරක්ෂිතව පවතී.</p>
            <input type="file" id="vault-input" multiple accept="image/*,video/*" class="btn" style="background:transparent; border:1px dashed #fff;">
            <div id="vault-gallery"></div>
        </div>
        <button class="btn" onclick="showSection('main-screen')" style="background: #555; margin-top:15px;">Back to Menu</button>
    </div>

    <script>
        let db;

        // Open IndexedDB for Permanent Vault Storage
        const request = indexedDB.open("NexoraVaultDB", 1);
        request.onupgradeneeded = function(e) {
            db = e.target.result;
            db.createObjectStore("files", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = function(e) { db = e.target.result; };

        function playSound() { 
            const snd = document.getElementById('clickSound');
            snd.currentTime = 0;
            snd.play(); 
        }

        // Snow Animation
        setInterval(() => {
            const snow = document.createElement('div');
            snow.classList.add('snowflake');
            snow.innerHTML = '❄';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.animationDuration = Math.random() * 3 + 2 + 's';
            snow.style.fontSize = Math.random() * 15 + 10 + 'px';
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 5000);
        }, 250);

        // App Start Logic
        function startApp() {
            playSound();
            const name = document.getElementById('username').value.trim();
            if(name === "Pansilu") {
                // Play Background Song after user interact
                document.getElementById('bgMusic').play().catch(err => console.log("Music waiting..."));
                showSection('main-screen');
                document.getElementById('welcome-txt').innerText = `ආයුබෝවන්, ${name}!`;
            } else {
                alert("වැරදි නමක්! 'Pansilu' ලෙස ඇතුළත් කරන්න.");
            }
        }

        function showSection(id) {
            playSound();
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'vault-section') loadVaultFiles();
        }

        function openLink(url) { playSound(); window.open(url, '_blank'); }

        // --- Image to PDF Suite ---
        async function generatePDF() {
            playSound();
            const input = document.getElementById('pdf-input');
            if (input.files.length === 0) return alert("කරුණාකර පින්තූර තෝරන්න!");
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const files = Array.from(input.files).slice(0, 20);

            alert("PDF එක සකසමින් පවතී. කරුණාකර රැඳී සිටින්න...");

            for(let i=0; i < files.length; i++) {
                if(i > 0) doc.addPage();
                const data = await readFileAsDataURL(files[i]);
                doc.addImage(data, 'JPEG', 10, 10, 190, 280);
            }

            const pdfBlob = doc.output('blob');
            const url = URL.createObjectURL(pdfBlob);
            addPdfToList(url, "Nexora_PDF_" + Date.now() + ".pdf");
        }

        function readFileAsDataURL(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function addPdfToList(url, name) {
            const container = document.getElementById('pdf-list');
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span>${name.substring(0,18)}...</span> 
                             <button class="btn" style="width:auto; margin:0; padding:5px 10px;" onclick="shareFile('${url}', '${name}')">Share</button>`;
            container.appendChild(div);
        }

        function shareFile(url, name) {
            playSound();
            if (navigator.share) {
                navigator.share({ title: name, url: url }).catch(err => console.log(err));
            } else {
                window.open(url);
            }
        }

        // --- Private Vault Suite (IndexedDB Permanent Storage) ---
        function checkVaultAccess() {
            playSound();
            const pass = prompt("Private Vault එකට ඇතුළු වීමට Lock Code එක ('1234') ලබා දෙන්න:");
            if (pass === "1234") {
                showSection('vault-section');
                const savedCustomCode = localStorage.getItem('myVaultCustomCode');
                if (!savedCustomCode) {
                    document.getElementById('vault-setup').classList.remove('hidden');
                    document.getElementById('vault-content').classList.add('hidden');
                } else {
                    verifyCustomCode(savedCustomCode);
                }
            } else {
                alert("වැරදි මුරපදයක්!");
            }
        }

        function verifyCustomCode(savedCode) {
            const customPass = prompt("ඔබ කලින් සාදාගත් පෞද්ගලික Secret Code එක ඇතුළත් කරන්න:");
            if(customPass === savedCode) {
                document.getElementById('vault-setup').classList.add('hidden');
                document.getElementById('vault-content').classList.remove('hidden');
                loadVaultFiles();
            } else {
                alert("පෞද්ගලික කේතය වැරදියි!");
                showSection('main-screen');
            }
        }

        function saveVaultCode() {
            playSound();
            const code = document.getElementById('new-vault-code').value.trim();
            if(code.length >= 4) {
                localStorage.setItem('myVaultCustomCode', code);
                alert("ඔබේ පෞද්ගලික කේතය සුරැකින ලදී!");
                document.getElementById('vault-setup').classList.add('hidden');
                document.getElementById('vault-content').classList.remove('hidden');
            } else {
                alert("කේතයට අවම වශයෙන් අකුරු/ඉලක්කම් 4ක් තිබිය යුතුය.");
            }
        }

        document.getElementById('vault-input').onchange = async function(e) {
            playSound();
            const files = Array.from(e.target.files);
            const transaction = db.transaction(["files"], "readwrite");
            const store = transaction.objectStore("files");

            for(let file of files) {
                const dataDataURL = await readFileAsDataURL(file);
                const fileRecord = {
                    name: file.name,
                    type: file.type,
                    data: dataDataURL
                };
                store.add(fileRecord);
            }

            transaction.oncomplete = function() {
                alert("Files සාර්ථකව Vault එක තුල ස්ථිරවම සඟවන ලදී!");
                loadVaultFiles();
            };
        };

        function loadVaultFiles() {
            const gallery = document.getElementById('vault-gallery');
            gallery.innerHTML = "";

            if (!db) return;
            const tx = db.transaction("files", "readonly");
            const store = tx.objectStore("files");
            const request = store.openCursor();

            request.onsuccess = function(e) {
                const cursor = e.target.result;
                if(cursor) {
                    const record = cursor.value;
                    const card = document.createElement('div');
                    card.className = 'vault-card';

                    if(record.type.startsWith('image/')) {
                        card.innerHTML = `<img src="${record.data}" class="vault-media"><br>
                                          <button class="delete-btn" onclick="deleteVaultFile(${record.id})">Delete</button>`;
                    } else if(record.type.startsWith('video/')) {
                        card.innerHTML = `<video src="${record.data}" controls class="vault-media"></video><br>
                                          <button class="delete-btn" onclick="deleteVaultFile(${record.id})">Delete</button>`;
                    }
                    gallery.appendChild(card);
                    cursor.continue();
                }
            };
        }

        function deleteVaultFile(id) {
            playSound();
            if(confirm("මෙම File එක සම්පූර්ණයෙන්ම මකා දැමීමට අවශ්‍යද?")) {
                const tx = db.transaction(["files"], "readwrite");
                const store = tx.objectStore("files");
                store.delete(id);
                tx.oncomplete = function() {
                    loadVaultFiles();
                };
            }
        }
    </script>
</body>
</html>
