<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Pro Max</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; overflow-x: hidden; }
        .container { padding: 20px; text-align: center; }
        .btn { background: #238636; color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; margin-top: 10px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .item { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; cursor: pointer; }
        
        /* ඇප් එක ඇතුළේ පෙන්වන Window එක */
        #app-window {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 1000;
        }
        #window-header {
            background: #161b22;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        iframe { width: 100%; height: calc(100% - 50px); border: none; }
        #main-content, #login-screen { padding: 20px; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>Nexora Pro Max</h2>
    <input type="text" id="uname" placeholder="ඔබේ නම..." style="width:80%; padding:10px; border-radius:5px;">
    <button class="btn" onclick="login()">Start App</button>
</div>

<div id="main-content" style="display:none;">
    <h3>ආයුබෝවන් <span id="user"></span></h3>
    <div class="grid">
        <div class="item" onclick="openApp('https://gemini.google.com/app')">🤖 Gemini</div>
        <div class="item" onclick="openApp('https://www.ilovepdf.com/jpg_to_pdf')">📄 PDF Tool</div>
        <div class="item" onclick="openApp('https://www.google.com/search?q=song+download')">🎵 Search Songs</div>
        <div class="item" onclick="openVault()">🔒 Vault</div>
    </div>
</div>

<div id="app-window">
    <div id="window-header">
        <span style="color:white; margin-left:10px;">Nexora Browser</span>
        <button onclick="closeApp()" style="background:red; color:white; border:none; padding:5px 15px; border-radius:5px;">Back</button>
    </div>
    <iframe id="app-frame" src=""></iframe>
</div>

<script>
    function login() {
        let n = document.getElementById("uname").value;
        if(n) {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-content").style.display = "block";
            document.getElementById("user").innerText = n;
        }
    }

    function openApp(url) {
        document.getElementById("app-frame").src = url;
        document.getElementById("app-window").style.display = "block";
    }

    function closeApp() {
        document.getElementById("app-window").style.display = "none";
        document.getElementById("app-frame").src = "";
    }

    function openVault() {
        let p = prompt("Password එක ගහන්න:");
        if(p === "1234") {
            alert("සාර්ථකයි! ඔයාගේ රහස් මෙතන තියෙනවා.");
        } else {
            alert("වැරදියි!");
        }
    }
</script>

</body>
</html>
