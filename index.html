<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Pro Max</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; color: white; transition: 0.5s; }
        .login-bg { background: linear-gradient(45deg, #0f2027, #203a43, #2c5364); }
        .main-bg { background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); background-size: 400% 400%; animation: gradientMove 10s infinite; }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #snow-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        .snowflake { position: absolute; top: -10px; color: white; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(105vh); } }

        .container { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); padding: 25px; border-radius: 25px; text-align: center; width: 85%; max-width: 420px; border: 1px solid rgba(255, 255, 255, 0.2); z-index: 10; position: relative; }
        .hidden { display: none !important; }

        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255, 255, 255, 0.2); color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; background: #2575fc; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn:active { transform: scale(0.95); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .grid-item { background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 15px; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); }

        /* Gemini Chat UI */
        #gemini-chat { height: 300px; overflow-y: auto; text-align: left; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; font-size: 14px; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 8px; }
        .user-msg { background: #2575fc; align-self: flex-end; }
        .ai-msg { background: #444; }

        /* Vault & Gallery */
        #preview-gallery { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; max-height: 120px; overflow-y: auto; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body class="login-bg">

    <div id="snow-container"></div>

    <audio id="bgMusic" loop>
        <source src="parano.mp3" type="audio/mpeg">
    </audio>

    <div id="login-screen" class="container">
        <h2 style="margin:0;">Nexora Pro Max</h2>
        <input type="text" id="username" placeholder="ඔබේ නම ලියන්න...">
        <button class="btn" onclick="startApp()">START APP</button>
    </div>

    <div id="main-screen" class="container hidden">
        <h3 id="welcome-txt" style="margin:0;">ආයුබෝවන්!</h3>
        <div class="grid">
            <div class="grid-item" onclick="btnClick(); showSection('gemini-ui')">🤖 Gemini AI</div>
            <div class="grid-item" onclick="btnClick(); showSection('pdf-ui')">📄 Image to PDF</div>
            <div class="grid-item" onclick="btnClick(); window.open('https://youtube.com/@nexoralab-y8j')">📺 YouTube</div>
            <div class="grid-item" onclick="btnClick(); window.open('https://whatsapp.com/channel/0029Vb7asEM9hXF90ZoOX12H')">💬 WhatsApp</div>
        </div>
        <button class="btn" style="background: #ff4b2b; margin-top: 15px;" onclick="btnClick(); showVault()">🔒 Private Vault</button>
    </div>

    <div id="gemini-ui" class="container hidden">
        <h4>Gemini AI Chat 🤖</h4>
        <div id="gemini-chat"></div>
        <input type="text" id="gemini-input" placeholder="ප්‍රශ්නය මෙතන ලියන්න...">
        <button class="btn" onclick="askGemini()">Ask Gemini</button>
        <button class="btn" style="background:gray;" onclick="goBack()">Back</button>
    </div>

    <div id="pdf-ui" class="container hidden">
        <h4>Images to PDF 📄</h4>
        <p style="font-size: 12px;">උපරිම පින්තූර 20ක් තෝරන්න.</p>
        <input type="file" id="pdf-input" multiple accept="image/*">
        <div id="pdf-previews" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;"></div>
        <button class="btn" style="background:#28a745;" onclick="generatePDF()">Convert to PDF</button>
        <button class="btn" style="background:gray;" onclick="goBack()">Back</button>
    </div>

    <div id="vault-screen" class="container hidden">
        <h3>🔒 Private Vault</h3>
        <p style="font-size: 12px; text-align:left;">Secret Code:</p>
        <textarea id="code-box"></textarea>
        <button class="btn" style="padding:5px; font-size:12px; background:#238636;" onclick="saveCode()">Save Code</button>
        <hr style="border:0.1px solid #333; margin:15px 0;">
        <p style="font-size: 12px; text-align:left;">Private Gallery:</p>
        <input type="file" id="media-input" multiple accept="image/*,video/*">
        <div id="preview-gallery"></div>
        <button class="btn" style="background: gray; margin-top:10px;" onclick="goBack()">Back</button>
    </div>

    <script>
        const API_KEY = "AIzaSyCA7n0laiPRZdE7ZNLuAzBAQZC63zLomvk";

        function btnClick() { new Audio('https://www.soundjay.com/buttons/button-16.mp3').play(); }

        function createSnow() {
            setInterval(() => {
                let flake = document.createElement('div');
                flake.className = 'snowflake'; flake.innerHTML = '❄';
                flake.style.left = Math.random() * 100 + 'vw';
                flake.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.getElementById('snow-container').appendChild(flake);
                setTimeout(() => flake.remove(), 4000);
            }, 200);
        }

        function startApp() {
            let name = document.getElementById('username').value;
            if (name) {
                btnClick();
                document.getElementById('bgMusic').play().catch(() => {});
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                document.body.className = "main-bg";
                document.getElementById('welcome-txt').innerText = "ආයුබෝවන්, " + name + "!";
                createSnow();
            } else { alert("නම ලියන්න!"); }
        }

        function showSection(id) {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function goBack() {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('main-screen').classList.remove('hidden');
        }

        // --- Gemini Logic ---
        async function askGemini() {
            let input = document.getElementById('gemini-input');
            let chat = document.getElementById('gemini-chat');
            if(!input.value) return;

            chat.innerHTML += `<div class="msg user-msg">${input.value}</div>`;
            let prompt = input.value;
            input.value = "";

            try {
                let res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                let data = await res.json();
                let reply = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg ai-msg">${reply}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (e) { chat.innerHTML += `<div class="msg ai-msg">Error: සමාවෙන්න, මට පිළිතුර සොයාගත නොහැකි විය.</div>`; }
        }

        // --- PDF Logic ---
        let pdfImages = [];
        document.getElementById('pdf-input').onchange = function(e) {
            pdfImages = Array.from(e.target.files).slice(0, 20);
            let prev = document.getElementById('pdf-previews');
            prev.innerHTML = "";
            pdfImages.forEach(f => {
                let img = document.createElement('img');
                img.src = URL.createObjectURL(f);
                img.style.width="40px"; img.style.height="40px"; img.style.objectFit="cover";
                prev.appendChild(img);
            });
        };

        async function generatePDF() {
            if(pdfImages.length === 0) return alert("කරුණාකර පින්තූර තෝරන්න!");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            for(let i=0; i<pdfImages.length; i++) {
                let imgData = await new Promise(resolve => {
                    let reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(pdfImages[i]);
                });
                if(i > 0) doc.addPage();
                doc.addImage(imgData, 'JPEG', 10, 10, 190, 250);
            }
            doc.save("Nexora_Document.pdf");
            alert("PDF එක සකසා අවසන්!");
        }

        // --- Vault Logic ---
        function showVault() {
            if(prompt("Password:") === "1234") {
                showSection('vault-screen');
                document.getElementById('code-box').value = localStorage.getItem('savedCode') || "";
            } else { alert("වැරදි මුරපදයක්!"); }
        }
        function saveCode() { localStorage.setItem('savedCode', document.getElementById('code-box').value); alert("Saved!"); }

        document.getElementById('media-input').onchange = function(e) {
            let gal = document.getElementById('preview-gallery');
            Array.from(e.target.files).forEach(f => {
                let reader = new FileReader();
                reader.onload = (ev) => {
                    let el = f.type.startsWith('image/') ? document.createElement('img') : document.createElement('video');
                    el.src = ev.target.result; el.className = 'preview-img'; if(f.type.startsWith('video/')) el.controls = true;
                    gal.appendChild(el);
                };
                reader.readAsDataURL(f);
            });
            alert("ගොනු එකතු කළා. දැන් ඔබට ගැලරියෙන් මේවා මකා දැමිය හැක.");
        };
    </script>
</body>
</html>
