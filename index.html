<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Pro Max</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Snow Animation */
        .snowflake {
            position: fixed;
            top: -10px;
            color: white;
            font-size: 1em;
            user-select: none;
            z-index: 1000;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(105vh); }
        }

        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .hidden { display: none; }

        input {
            width: 80%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }

        .btn {
            background: #ff4b2b;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin: 10px;
        }

        .btn:hover { transform: scale(1.05); background: #ff416c; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
        }

        .top-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="clickSound">
        <source src="https://www.soundjay.com/buttons/button-16.mp3" type="audio/mpeg">
    </audio>

    <div id="login-screen" class="container">
        <h2>Nexora Pro Max</h2>
        <input type="text" id="username" placeholder="ඔබේ නම ලියන්න...">
        <button class="btn" onclick="startApp()">START APP</button>
    </div>

    <div id="main-screen" class="container hidden">
        <img src="https://via.placeholder.com/100" alt="App Logo" class="top-img" id="app-logo">
        <h3 id="welcome-txt">ආයුබෝවන්!</h3>
        
        <div class="grid">
            <div class="grid-item" onclick="openLink('https://youtube.com/@NexoraLab-y8j')">📺 YouTube</div>
            <div class="grid-item" onclick="openLink('https://whatsapp.com/channel/0029Vb7asEM9hXF90ZoOoX12H')">💬 WhatsApp</div>
            <div class="grid-item" onclick="showSection('pdf-area')">📄 Image to PDF</div>
            <div class="grid-item" onclick="checkVault()">🔐 Private Vault</div>
        </div>
    </div>

    <div id="pdf-area" class="container hidden">
        <h3>Image to PDF</h3>
        <input type="file" id="image-input" multiple accept="image/*">
        <button class="btn" onclick="generatePDF()">Convert to PDF</button>
        <button class="btn" onclick="showSection('main-screen')" style="background: #555;">Back</button>
    </div>

    <script>
        // Start Background Music on first click
        document.body.addEventListener('click', () => {
            const music = document.getElementById('bgMusic');
            if (music.paused) music.play();
        }, { once: true });

        function playClick() {
            document.getElementById('clickSound').play();
        }

        // --- SNOW ANIMATION ---
        function createSnow() {
            const snow = document.createElement('div');
            snow.classList.add('snowflake');
            snow.innerHTML = '❄';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.animationDuration = Math.random() * 3 + 2 + 's';
            snow.style.opacity = Math.random();
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 5000);
        }
        setInterval(createSnow, 200);

        // --- LOGIC ---
        function startApp() {
            playClick();
            const user = document.getElementById('username').value.trim();
            
            // නිවැරදි නම පරීක්ෂාව
            if (user === "Pansilu") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                document.getElementById('welcome-txt').innerText = `ආයුබෝවන්, ${user}!`;
            } else {
                alert("වැරදි නමක්! කරුණාකර 'Pansilu' ලෙස ඇතුළත් කරන්න.");
            }
        }

        function showSection(id) {
            playClick();
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function openLink(url) {
            playClick();
            window.open(url, '_blank');
        }

        function checkVault() {
            playClick();
            let pw = prompt("Private Vault මුරපදය ඇතුළත් කරන්න:");
            if (pw === "1234") {
                alert("මුරපදය නිවැරදියි! Vault එක විවෘත වේ.");
            } else {
                alert("වැරදි මුරපදයක්!");
            }
        }

        async function generatePDF() {
            playClick();
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const files = document.getElementById('image-input').files;

            if (files.length === 0) return alert("කරුණාකර පින්තූර තෝරන්න!");

            alert("PDF එක සකසමින් පවතී...");
            doc.text("Nexora Pro Max PDF", 10, 10);
            doc.save("Nexora_Doc.pdf");
            alert("PDF එක සාර්ථකව Download විය!");
        }
    </script>
</body>
</html>
