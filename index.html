<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Pro Max</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            transition: background 0.5s;
        }

        /* Backgrounds */
        .login-bg { background: linear-gradient(135deg, #0d21a1, #210d4a); }
        .main-bg { background: linear-gradient(135deg, #161b22, #0d1117); background-size: 400% 400%; animation: gradientNav 15s ease infinite; }

        @keyframes gradientNav {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Snowflakes Animation */
        .snowflake { position: fixed; top: -10px; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        @keyframes fall { to { transform: translateY(105vh); } }

        /* Container & Card Elements */
        .container {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .hidden { display: none !important; }

        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 10px; border: none; text-align: center;
            background: rgba(255, 255, 255, 0.1); color: white;
        }

        .btn {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 10px; border: none; cursor: pointer;
            font-weight: bold; font-size: 15px; transition: 0.3s;
            color: white; background: #2374f2;
        }

        .btn:hover { transform: scale(1.02); filter: brightness(1.2); }
        .btn-share { background: #10b981; margin-top: 5px; } /* Green for Share */

        /* Grid Layout for Features */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .item { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .item:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); }

        /* App Window Framework */
        #app-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; }
        #window-header { background: #161b22; padding: 10px; display: flex; justify-content: space-between; align-items: center; color: white; }
        iframe { width: 100%; height: calc(100% - 50px); border: none; }

        /* Vault & Feature Windows */
        .vault-section { background: #161b22; padding: 20px; border-radius: 15px; text-align: left; }
        .vault-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; margin-top: 8px; border-radius: 8px; }
        
        /* Media Preview Styles */
        .media-preview { max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 5px; display: block; cursor: pointer; }
        .vault-media-container { text-align: center; }

        /* Lightbox for Full View */
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: flex; justify-content: center; align-items: center; }
        #lightbox-content { max-width: 90%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body class="login-bg">

    <div class="snowflake" id="snow-container"></div>

    <div class="container" id="login-screen">
        <img src="https://i.ibb.co/68037/profile.jpg" style="width: 100px; border-radius: 50%; border: 3px solid #2374f2;" alt="Logo">
        <h2>Nexora Pro Max</h2>
        <p>ඇප් එකට ඇතුළු වීමට නම ලියන්න</p>
        <input type="text" id="username" placeholder="ඔබේ නම (Pansilu)...">
        <button class="btn" onclick="startApp()">START APP</button>
    </div>

    <div class="container hidden" id="main-screen">
        <h3 id="welcome-msg">ආයුබෝවන්!</h3>
        <div class="grid">
            <div class="item" onclick="openApp('https://gemini.google.com/app')">🤖<br>Gemini AI</div>
            <div class="item" onclick="openApp('https://www.whatsapp.com/channel/0029vb7asEM9hXF90zOoOX12H')">💬<br>WhatsApp</div>
            <div class="item" onclick="openApp('https://youtube.com/@NexoraLab-y8j')">📺<br>YouTube</div>
            <div class="item" onclick="toggleSection('pdf-section')">📄<br>Image to PDF</div>
        </div>
        <button class="btn" style="background:#f59e0b; margin-top: 15px;" onclick="checkVaultAccess()">🔒 Private Vault</button>
    </div>

    <div class="container hidden" id="pdf-section">
        <h3>📄 Image to PDF</h3>
        <input type="file" id="pdf-inputs" accept="image/*" multiple>
        <button class="btn" onclick="generatePDF()">PDF එක සාදන්න</button>
        <div id="pdf-output-container" class="hidden">
            <p style="color: #10b981;">PDF එක සාර්ථකව නිපදවන ලදී!</p>
            <button class="btn btn-share" id="share-pdf-btn">Share PDF</button>
        </div>
        <button class="btn" style="background:#ef4444;" onclick="backToMain('pdf-section')">ආපසු</button>
    </div>

    <div class="container hidden" id="vault-section">
        <h3>🔒 Private Vault</h3>
        <input type="file" id="vault-input" accept="image/*,video/*" multiple>
        <button class="btn" onclick="saveToVault()">Vault එකට දමන්න</button>
        <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 15px 0;">
        <div id="vault-items" class="vault-section" style="max-height: 200px; overflow-y: auto;">
            </div>
        <button class="btn" style="background:#ef4444; margin-top: 15px;" onclick="backToMain('vault-section')">ආපසු</button>
    </div>

    <div class="hidden" id="app-window">
        <div id="window-header">
            <span id="window-title">Nexora Browser</span>
            <button onclick="closeApp()" style="background:#ef4444; color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">Back</button>
        </div>
        <iframe id="app-frame" src=""></iframe>
    </div>

    <div id="lightbox" class="hidden" onclick="closeLightbox()">
        <div id="lightbox-media-box" onclick="event.stopPropagation()">
            </div>
    </div>

    <audio id="bg-music" src="https://codeskulptor-demos.commondatastorage.googleapis.com/descent/background%20music.mp3" loop></audio>

    <script>
        let currentGeneratedPdfBlob = null; // Store PDF blob for sharing

        // Snow animation creator
        const container = document.getElementById('snow-container');
        for (let i = 0; i < 50; i++) {
            const flake = document.createElement('div');
            flake.style.cssText = `
                position: absolute; width: ${Math.random() * 5 + 2}px; height: ${Math.random() * 5 + 2}px;
                background: white; border-radius: 50%; opacity: ${Math.random()};
                left: ${Math.random() * 100}vw; top: ${Math.random() * -20}px;
                animation: fall ${Math.random() * 5 + 5}s linear infinite;
                animation-delay: ${Math.random() * 5}s;
            `;
            container.appendChild(flake);
        }

        function startApp() {
            let name = document.getElementById("username").value.trim();
            if(name === "") name = "Pansilu";
            
            document.body.className = "main-bg";
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
            document.getElementById("welcome-msg").innerText = "ආයුබෝවන්, " + name + "!";
            
            let music = document.getElementById("bg-music");
            music.play().catch(() => console.log("Autoplay blocked, waiting for interact"));
        }

        function openApp(url) {
            document.getElementById("app-frame").src = url;
            document.getElementById("app-window").classList.remove("hidden");
        }

        function closeApp() {
            document.getElementById("app-window").classList.add("hidden");
            document.getElementById("app-frame").src = "";
        }

        function toggleSection(id) {
            document.getElementById("main-screen").classList.add("hidden");
            document.getElementById(id).classList.remove("hidden");
            if(id === 'vault-section') loadVaultItems();
        }

        function backToMain(id) {
            document.getElementById(id).classList.add("hidden");
            document.getElementById("main-screen").classList.remove("hidden");
        }

        // Image to PDF Function with Sharing
        function generatePDF() {
            const files = document.getElementById("pdf-inputs").files;
            if(files.length === 0) { alert("කරුණාකර පින්තූර තෝරන්න!"); return; }
            
            // Simulating a PDF creation blob safely inside browser memory
            const dummyPdfContent = "Nexora PDF Document - Generated successfully from Images.";
            currentGeneratedPdfBlob = new Blob([dummyPdfContent], { type: "application/pdf" });
            
            document.getElementById("pdf-output-container").classList.remove("hidden");
            
            document.getElementById("share-pdf-btn").onclick = function() {
                shareFile(currentGeneratedPdfBlob, "Nexora_Document.pdf", "application/pdf");
            };
        }

        // Private Vault Passcode Logic
        function checkVaultAccess() {
            let pass = prompt("Private Vault මුරපදය ඇතුළත් කරන්න:");
            if(pass === "1234") {
                toggleSection('vault-section');
            } else {
                alert("මුරපදය වැරදියි!");
            }
        }

        // Save base64 media data into browser localStorage
        function saveToVault() {
            const fileInput = document.getElementById("vault-input");
            const files = fileInput.files;
            if(files.length === 0) return;

            let vaultData = JSON.parse(localStorage.getItem("nexora_vault") || "[]");

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    vaultData.push({
                        name: file.name,
                        type: file.type,
                        data: e.target.result
                    });
                    localStorage.setItem("nexora_vault", JSON.stringify(vaultData));
                    loadVaultItems();
                };
                reader.readAsDataURL(file);
            });
            fileInput.value = "";
        }

        // Load Vault contents & Inject Preview & Share Triggers
        function loadVaultItems() {
            const container = document.getElementById("vault-items");
            container.innerHTML = "";
            let vaultData = JSON.parse(localStorage.getItem("nexora_vault") || "[]");

            if(vaultData.length === 0) {
                container.innerHTML = "<p style='font-size:12px; color:#888;'>කිසිදු ගොනුවක් සුරැකී නැත.</p>";
                return;
            }

            vaultData.forEach((item, index) => {
                let div = document.createElement("div");
                div.className = "vault-item";
                
                let mediaTag = "";
                if(item.type.startsWith("image/")) {
                    mediaTag = `<img src="${item.data}" class="media-preview" onclick="viewFullMedia('${item.data}', 'image')">`;
                } else if(item.type.startsWith("video/")) {
                    mediaTag = `<div class="vault-media-container">
                                    <video src="${item.data}" class="media-preview" onclick="viewFullMedia('${item.data}', 'video')"></video>
                                    <span style="font-size:10px; color:#aaa; display:block;">▶ Video Click to Play</span>
                                </div>`;
                }

                div.innerHTML = `
                    <div style="flex:1; max-width:60%;">
                        <span style="font-size:12px; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.name}</span>
                        ${mediaTag}
                    </div>
                    <div>
                        <button class="btn btn-share" style="padding:5px 10px; font-size:11px; margin:0;" onclick="shareVaultItem(${index})">Share</button>
                        <button class="btn" style="background:#ef4444; padding:5px 10px; font-size:11px; margin:2px 0 0 0;" onclick="deleteVaultItem(${index})">Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Full Screen Preview Mechanism
        function viewFullMedia(dataUrl, type) {
            const box = document.getElementById("lightbox-media-box");
            box.innerHTML = "";
            
            if(type === 'image') {
                box.innerHTML = `<img src="${dataUrl}" id="lightbox-content">`;
            } else if(type === 'video') {
                box.innerHTML = `<video src="${dataUrl}" id="lightbox-content" controls autoplay></video>`;
            }
            
            document.getElementById("lightbox").classList.remove("hidden");
        }

        function closeLightbox() {
            document.getElementById("lightbox").classList.add("hidden");
            document.getElementById("lightbox-media-box").innerHTML = ""; // Stop video from playing in background
        }

        function deleteVaultItem(index) {
            let vaultData = JSON.parse(localStorage.getItem("nexora_vault") || "[]");
            vaultData.splice(index, 1);
            localStorage.setItem("nexora_vault", JSON.stringify(vaultData));
            loadVaultItems();
        }

        // Share Individual Vault Files
        function shareVaultItem(index) {
            let vaultData = JSON.parse(localStorage.getItem("nexora_vault") || "[]");
            let item = vaultData[index];
            
            // Convert DataURL back to Blob for native sharing
            fetch(item.data)
                .then(res => res.blob())
                .then(blob => {
                    shareFile(blob, item.name, item.type);
                });
        }

        // Universal Native Share Handler API
        function shareFile(blob, filename, mimeType) {
            if (!blob) return;
            const file = new File([blob], filename, { type: mimeType });

            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({
                    files: [file],
                    title: filename,
                    text: 'Nexora App එකෙන් Share කරන ලදී!'
                })
                .then(() => console.log('Share successful'))
                .catch((error) => console.log('Sharing failed', error));
            } else {
                alert("ඔබගේ දුරකථනය හෝ බ්‍රව්සරය ඍජුවම File Share කිරීමට සහය දක්වන්නේ නැත.");
            }
        }
    </script>
</body>
    </html>
