<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Pro Max</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: white; margin: 0; text-align: center; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .item { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; cursor: pointer; transition: 0.3s; }
        .item:hover { transform: scale(1.05); border-color: #58a6ff; }
        input, textarea { width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #30363d; background: #0d1117; color: white; }
        .btn { background: #238636; color: white; padding: 15px; border: none; border-radius: 10px; width: 90%; cursor: pointer; font-weight: bold; }
        
        #app-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; }
        iframe { width: 100%; height: calc(100% - 50px); border: none; }
        #vault-ui, #news-ui, #main-ui { display: none; }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="parano.mp3" type="audio/mpeg">
</audio>

<div id="login-screen" class="container" style="margin-top: 100px;">
    <h2>Nexora Pro Max</h2>
    <input type="text" id="uname" placeholder="ඔබේ නම ලියන්න...">
    <button class="btn" onclick="startApp()">START APP</button>
</div>

<div id="main-ui" class="container">
    <h3>ආයුබෝවන්, <span id="user"></span>!</h3>
    <div class="grid">
        <div class="item" onclick="openApp('https://gemini.google.com/app')">🤖 Gemini AI</div>
        <div class="item" onclick="openApp('https://www.ilovepdf.com/jpg_to_pdf')">📄 Image to PDF</div>
        <div class="item" onclick="openApp('https://www.y2mate.com')">🎵 Download Songs</div>
        <div class="item" onclick="showVault()">🔒 Private Vault</div>
        <div class="item" onclick="showNews()" style="grid-column: span 2; background: #21262d;">📰 Daily Tech News</div>
    </div>
    <button class="btn" style="background:#25d366; margin-top:20px;" onclick="window.open('https://whatsapp.com/channel/0029Vb7asEM9hXF90ZoOX12H')">Tech Sinhala WhatsApp</button>
    <button class="btn" style="background:#ff0000; margin-top:10px;" onclick="window.open('https://youtube.com/@NexoraLab-y8j')">YouTube Channel</button>
</div>

<div id="app-window">
    <div style="background:#161b22; padding:10px; display:flex; justify-content:space-between;">
        <span style="color:white;">Nexora Browser</span>
        <button onclick="closeApp()" style="background:red; color:white; border:none; border-radius:5px; padding:5px 10px;">Back</button>
    </div>
    <iframe id="app-frame" src=""></iframe>
</div>

<div id="vault-ui" class="container">
    <h3>Private Vault 🔒</h3>
    <textarea id="vault-input" placeholder="ඔබේ රහස් මෙතන ලියන්න..."></textarea>
    <button class="btn" onclick="saveNote()">Save Note</button>
    <button class="btn" style="background:gray; margin-top:10px;" onclick="exitToMain('vault-ui')">Back</button>
    <div id="saved-notes" style="margin-top:20px; text-align:left; border-top:1px solid #333; padding-top:10px;"></div>
</div>

<div id="news-ui" class="container">
    <h3>Tech News 📰</h3>
    <div id="news-content" style="text-align:left; font-size:14px;">
        <p>• පන්සිළු, මෙතනට අපි API එකක් නැතුව පුවත් ගේමු...</p>
        <p>• Apple සමාගම අලුත්ම iPhone එක හඳුන්වා දෙයි.</p>
        <p>• AI තාක්ෂණය ලෝකය වේගයෙන් වෙනස් කරයි.</p>
    </div>
    <button class="btn" style="background:gray; margin-top:20px;" onclick="exitToMain('news-ui')">Back</button>
</div>

<script>
    function startApp() {
        let n = document.getElementById("uname").value;
        if(n) {
            let music = document.getElementById("bgMusic");
            music.play(); // සින්දුව පටන් ගනී
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main-ui").style.display = "block";
            document.getElementById("user").innerText = n;
        } else { alert("නම ඇතුළත් කරන්න!"); }
    }

    function openApp(url) {
        document.getElementById("app-frame").src = url;
        document.getElementById("app-window").style.display = "block";
    }

    function closeApp() {
        document.getElementById("app-window").style.display = "none";
        document.getElementById("app-frame").src = "";
    }

    function showVault() {
        if(prompt("මුරපදය:") === "1234") {
            document.getElementById("main-ui").style.display = "none";
            document.getElementById("vault-ui").style.display = "block";
            document.getElementById("saved-notes").innerText = localStorage.getItem("note") || "සේව් කළ දත්ත නැත.";
        }
    }

    function saveNote() {
        let note = document.getElementById("vault-input").value;
        localStorage.setItem("note", note);
        document.getElementById("saved-notes").innerText = note;
        alert("Saved!");
    }

    function showNews() {
        document.getElementById("main-ui").style.display = "none";
        document.getElementById("news-ui").style.display = "block";
    }

    function exitToMain(id) {
        document.getElementById(id).style.display = "none";
        document.getElementById("main-ui").style.display = "block";
    }
</script>
</body>
</html>
