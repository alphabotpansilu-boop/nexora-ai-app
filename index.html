<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Pro Max</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: 0.5s;
        }

        /* Background animation */
        @keyframes bgAnimate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-screen, .main-screen, .app-window {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: absolute;
            transition: 0.5s ease-in-out;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 85%;
        }

        h2, h3 {
            margin-top: 0;
            color: #fff;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2575fc;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        /* Grid Layout for Features */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
            width: 100%;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .grid-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .grid-item span {
            display: block;
            margin-top: 8px;
            font-size: 14px;
        }

        .vault-btn {
            background: #ff4f4f !important;
            margin-top: 20px;
        }

        iframe {
            width: 100%;
            height: calc(100% - 60px);
            border: none;
            background: white;
        }

        /* PDF Preview Area */
        #preview-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
            max-height: 150px;
            overflow-y: auto;
            justify-content: center;
        }

        .preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #2575fc;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="login-screen">
        <div class="container">
            <h2>Nexora Pro Max</h2>
            <input type="text" id="username" placeholder="ඔබේ නම ලියන්න...">
            <button class="btn" onclick="startApp()">START APP</button>
        </div>
    </div>

    <div id="main-screen" class="main-screen hidden">
        <div class="container">
            <h3 id="welcome-text">ආයුබෝවන්!</h3>
            <div class="grid">
                <div class="grid-item" onclick="openApp('pdf')">
                    📄 <span>Image to PDF</span>
                </div>
                <div class="grid-item" onclick="openApp('youtube')">
                    📺 <span>YouTube</span>
                </div>
                <div class="grid-item" onclick="openApp('whatsapp')">
                    💬 <span>WhatsApp</span>
                </div>
            </div>
            <button class="btn vault-btn" onclick="checkVaultAccess()">🔒 Private Vault</button>
        </div>
    </div>

    <div id="app-window" class="app-window hidden">
        <div style="background: #161b22; padding: 10px; display: flex; justify-content: space-between; width: 100%; box-sizing: border-box;">
            <span id="window-title" style="font-weight: bold;">Browser</span>
            <button onclick="closeApp()" style="background: red; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Close</button>
        </div>
        <iframe id="app-frame" src=""></iframe>
    </div>

    <div id="pdf-window" class="app-window hidden">
        <div class="container">
            <h3>Images to PDF 📄</h3>
            <p style="font-size: 12px; color: #aaa;">උපරිම පින්තූර 20ක් තෝරන්න.</p>
            <input type="file" id="media-input" multiple accept="image/*" style="font-size: 12px; margin: 10px 0;">
            <div id="preview-gallery"></div>
            <button class="btn" onclick="generatePDF()" style="background: #2ecc71;">Convert to PDF</button>
            <button class="btn" onclick="closeApp()" style="background: #7f8c8d; margin-top: 10px;">Back</button>
        </div>
    </div>

    <div id="vault-screen" class="app-window hidden">
        <div class="container">
            <h3>🔒 Private Vault</h3>
            <div id="code-box">
                <input type="password" id="vault-code-input" placeholder="Secret Code එක ඇතුළත් කරන්න">
                <button class="btn" onclick="saveCode()" style="background: #2ecc71;">Save Code</button>
            </div>
            <div id="vault-area" class="hidden">
                <input type="file" id="vault-input" multiple style="font-size: 12px; margin: 10px 0;">
                <div id="vault-gallery" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;"></div>
            </div>
            <button class="btn" onclick="closeApp()" style="background: #7f8c8d; margin-top: 15px;">Back to Menu</button>
        </div>
    </div>

    <script>
        let pdfImages = [];

        // Sound Effect Function
        function btnClickSound() {
            let snd = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
            snd.play();
        }

        // Add sound to all buttons automatically
        document.querySelectorAll('button, .grid-item').forEach(element => {
            element.addEventListener('click', btnClickSound);
        });

        function startApp() {
            let user = document.getElementById('username').value.trim();
            if(user === "") {
                alert("කරුණාකර ඔබේ නම ඇතුළත් කරන්න!");
                return;
            }
            document.getElementById('welcome-text').innerText = `ආයුබෝවන්, ${user}!`;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }

        function openApp(type) {
            document.getElementById('main-screen').classList.add('hidden');
            
            if(type === 'youtube') {
                document.getElementById('window-title').innerText = "YouTube";
                document.getElementById('app-frame').src = "https://www.youtube.com/embed/"; 
                document.getElementById('app-window').classList.remove('hidden');
            } 
            else if(type === 'whatsapp') {
                document.getElementById('window-title').innerText = "WhatsApp Channel";
                document.getElementById('app-frame').src = "https://whatsapp.com/channel/0029Vb7asEM9hXF90Z0oOX12H";
                document.getElementById('app-window').classList.remove('hidden');
            }
            else if(type === 'pdf') {
                document.getElementById('pdf-window').classList.remove('hidden');
            }
        }

        function closeApp() {
            document.getElementById('app-window').classList.add('hidden');
            document.getElementById('pdf-window').classList.add('hidden');
            document.getElementById('vault-screen').classList.add('hidden');
            document.getElementById('app-frame').src = "";
            document.getElementById('main-screen').classList.remove('hidden');
        }

        // Image to PDF Handling
        document.getElementById('media-input').onchange = function(e) {
            let gal = document.getElementById('preview-gallery');
            gal.innerHTML = "";
            pdfImages = Array.from(e.target.files).slice(0, 20);

            pdfImages.forEach(file => {
                let reader = new FileReader();
                reader.onload = (ev) => {
                    let img = document.createElement('img');
                    img.src = ev.target.result;
                    img.className = 'preview-img';
                    gal.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        };

        async function generatePDF() {
            if(pdfImages.length === 0) return alert("කරුණාකර පින්තූර තෝරන්න!");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            for(let i=0; i<pdfImages.length; i++) {
                if(i > 0) doc.addPage();
                let src = await new Promise(resolve => {
                    let r = new FileReader();
                    r.onload = (e) => resolve(e.target.result);
                    r.readAsDataURL(pdfImages[i]);
                });
                doc.addImage(src, 'JPEG', 10, 10, 190, 250);
            }
            doc.save("Nexora_Document.pdf");
            alert("PDF එක සාර්ථකව නිපදවන ලදී!");
        }

        // Private Vault Handling
        function checkVaultAccess() {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('vault-screen').classList.remove('hidden');
            
            let savedCode = localStorage.getItem('vaultCode');
            if(savedCode) {
                document.getElementById('code-box').classList.add('hidden');
                let promptCode = prompt("Vault Password එක ඇතුළත් කරන්න:");
                if(promptCode === savedCode) {
                    document.getElementById('vault-area').classList.remove('hidden');
                    loadVaultFiles();
                } else {
                    alert("වැරදි Password එකක්!");
                    closeApp();
                }
            } else {
                document.getElementById('code-box').classList.remove('hidden');
                document.getElementById('vault-area').classList.add('hidden');
            }
        }

        function saveCode() {
            let code = document.getElementById('vault-code-input').value.trim();
            if(code.length < 4) return alert("Password එකට අවම වශයෙන් අකුරු/ඉලක්කම් 4ක් තිබිය යුතුය.");
            localStorage.setItem('vaultCode', code);
            alert("Password එක සාර්ථකව සුරැකින ලදී!");
            checkVaultAccess();
        }

        document.getElementById('vault-input').onchange = function(e) {
            let files = Array.from(e.target.files);
            let vaultData = JSON.parse(localStorage.getItem('vaultFiles') || "[]");

            files.forEach(file => {
                let r = new FileReader();
                r.onload = (ev) => {
                    vaultData.push(ev.target.result);
                    localStorage.setItem('vaultFiles', JSON.stringify(vaultData));
                    loadVaultFiles();
                };
                r.readAsDataURL(file);
            });
        };

        function loadVaultFiles() {
            let gal = document.getElementById('vault-gallery');
            gal.innerHTML = "";
            let vaultData = JSON.parse(localStorage.getItem('vaultFiles') || "[]");
            vaultData.forEach(src => {
                let img = document.createElement('img');
                img.src = src;
                img.className = 'preview-img';
                gal.appendChild(img);
            });
        }
    </script>
</body>
</html>
